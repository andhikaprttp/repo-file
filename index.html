<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repository Files</title>

<style>
body{
    font-family: monospace;
    max-width:1000px;
    margin:auto;
    padding:20px;
    background:#fff;
    color:#000;
}

h1{
    border-bottom:1px solid #ccc;
    padding-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    text-align:left;
    padding:8px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f5f5f5;
}

a{
    text-decoration:none;
    color:#0066cc;
}

.search{
    width:100%;
    padding:8px;
    margin-bottom:15px;
    border:1px solid #ccc;
}

.info{
    margin:10px 0;
    color:#666;
}
</style>
</head>
<body>

<h1>Index of /files</h1>

<input
type="text"
id="search"
class="search"
placeholder="Cari file..."
>

<div class="info">
<span id="totalFiles">0</span> files
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Size</th>
<th>Type</th>
<th>Action</th>
</tr>
</thead>

<tbody id="fileList">
<tr>
<td colspan="4">Loading...</td>
</tr>
</tbody>
</table>

<script>

const OWNER = "andhikaprttp";
const REPO = "repo-file";
const PATH = "files";

let allFiles = [];

function formatSize(bytes){

    if(bytes < 1024)
        return bytes + " B";

    if(bytes < 1024*1024)
        return (bytes/1024).toFixed(2)+" KB";

    if(bytes < 1024*1024*1024)
        return (bytes/1024/1024).toFixed(2)+" MB";

    return (bytes/1024/1024/1024).toFixed(2)+" GB";
}

function getIcon(name){

    const ext = name.split('.').pop().toLowerCase();

    const icons = {
        jpg:"📷",
        jpeg:"📷",
        png:"📷",
        gif:"📷",
        webp:"📷",
        pdf:"📄",
        doc:"📝",
        docx:"📝",
        xls:"📊",
        xlsx:"📊",
        zip:"📦",
        rar:"📦",
        "7z":"📦",
        txt:"📄"
    };

    return icons[ext] || "📁";
}

function render(files){

    const tbody = document.getElementById("fileList");

    tbody.innerHTML = "";

    files.forEach(file=>{

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>
            ${getIcon(file.name)}
            <a href="${file.download_url}" target="_blank">
                ${file.name}
            </a>
        </td>

        <td>${formatSize(file.size)}</td>

        <td>${file.name.split('.').pop()}</td>

        <td>
            <a href="${file.download_url}" download>
                Download
            </a>
        </td>
        `;

        tbody.appendChild(row);

    });

    document.getElementById("totalFiles").innerText =
        files.length;
}

async function loadFiles(){

    try{

        const url =
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;

        const response = await fetch(url);

        const data = await response.json();

        allFiles = data.filter(
            item => item.type === "file"
        );

        render(allFiles);

    }catch(err){

        document.getElementById("fileList").innerHTML =
        `<tr><td colspan="4">Failed loading files</td></tr>`;

        console.error(err);
    }
}

document
.getElementById("search")
.addEventListener("input", function(){

    const keyword =
    this.value.toLowerCase();

    const filtered =
    allFiles.filter(file =>
        file.name.toLowerCase().includes(keyword)
    );

    render(filtered);

});

loadFiles();

</script>

</body>
</html>
