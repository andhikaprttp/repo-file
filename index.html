<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personal File Repository</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', 
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#3b82f6' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen font-sans overflow-hidden">

    <div id="toast-container" class="fixed bottom-20 md:bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <div id="login-view" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 dark:border-gray-700">
            <div class="text-center mb-8">
                <svg class="w-12 h-12 mx-auto text-primary mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                <h1 class="text-2xl font-bold">File Repository</h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Portal Berbagi File Pribadi</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="login-password" required class="w-full px-4 py-3 md:py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="Masukkan password...">
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-blue-600 text-white font-medium py-3 md:py-2 px-4 rounded-lg transition-colors">Masuk</button>
            </form>
        </div>
    </div>

    <div id="dashboard-view" class="hidden flex h-screen w-full relative">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden backdrop-blur-sm transition-opacity opacity-0"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-6 flex items-center justify-between gap-3 border-b md:border-none border-gray-100 dark:border-gray-700">
                <div class="flex items-center gap-3">
                    <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
                    <span class="font-bold text-lg">My Repo</span>
                </div>
                <button id="btn-close-sidebar" class="md:hidden p-2 text-gray-500 hover:text-gray-800 dark:hover:text-white rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 overflow-y-auto py-4 md:py-0">
                <div id="dropzone" class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-4 text-center cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors group">
                    <input type="file" id="file-input" multiple class="hidden">
                    <svg class="w-8 h-8 mx-auto text-gray-400 group-hover:text-primary transition-colors mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-sm font-medium">Upload File</p>
                    <p class="text-xs text-gray-500 mt-1 hidden md:block">Drag & Drop atau Klik (Ctrl+U)</p>
                    <p class="text-xs text-gray-500 mt-1 md:hidden">Ketuk untuk memilih file</p>
                </div>

                <div class="mt-8 space-y-3">
                    <div class="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg">
                        <p class="text-xs text-gray-500 dark:text-gray-400">Total Storage Used</p>
                        <p class="font-semibold text-lg" id="stat-storage">0 MB</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg">
                            <p class="text-xs text-gray-500 dark:text-gray-400">Files</p>
                            <p class="font-semibold" id="stat-files">0</p>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg">
                            <p class="text-xs text-gray-500 dark:text-gray-400">Today</p>
                            <p class="font-semibold" id="stat-today">0</p>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <button id="btn-logout" class="flex items-center gap-2 text-sm text-red-500 hover:text-red-600 font-medium w-full px-2 py-3 md:py-2 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Logout
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full relative w-full overflow-hidden">
            <div id="upload-progress-container" class="hidden absolute top-0 left-0 w-full z-10 bg-white/95 dark:bg-gray-800/95 backdrop-blur border-b border-gray-200 dark:border-gray-700 px-6 py-4 shadow-sm">
                <div class="flex justify-between text-sm font-medium mb-2">
                    <span id="upload-status-text" class="truncate pr-4">Uploading...</span>
                    <span id="upload-percentage">0%</span>
                </div>
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                    <div id="upload-progress-bar" class="bg-primary h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <header class="h-16 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 md:px-6 bg-white dark:bg-gray-800 shrink-0 gap-2">
                
                <div class="flex items-center gap-2 md:gap-4 flex-1">
                    <button id="btn-open-sidebar" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-primary transition-colors rounded-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>

                    <div class="relative w-full max-w-md">
                        <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="search-input" placeholder="Cari file..." class="w-full pl-10 pr-4 py-2 md:py-2.5 rounded-lg bg-gray-100 dark:bg-gray-700 border-none focus:ring-2 focus:ring-primary outline-none text-sm transition-all">
                    </div>
                </div>

                <div class="flex items-center gap-2 md:gap-3">
                    <select id="type-filter" class="text-sm bg-gray-100 dark:bg-gray-700 rounded-lg px-2 py-2 md:px-3 border-none focus:ring-2 focus:ring-primary outline-none max-w-[100px] md:max-w-none truncate">
                        <option value="all">Semua</option>
                        <option value="image">Gambar</option>
                        <option value="document">Dokumen</option>
                        <option value="spreadsheet">Spreadsheet</option>
                        <option value="presentation">Presentasi</option>
                        <option value="archive">Arsip</option>
                    </select>

                    <select id="sort-filter" class="text-sm bg-gray-100 dark:bg-gray-700 rounded-lg px-3 py-2 border-none focus:ring-2 focus:ring-primary outline-none hidden md:block">
                        <option value="newest">Terbaru</option>
                        <option value="oldest">Terlama</option>
                        <option value="name-asc">Nama A-Z</option>
                        <option value="name-desc">Nama Z-A</option>
                        <option value="size-desc">Terbesar</option>
                        <option value="size-asc">Terkecil</option>
                    </select>

                    <div class="flex bg-gray-100 dark:bg-gray-700 rounded-lg p-1 hidden sm:flex">
                        <button id="btn-grid-view" class="p-1.5 rounded bg-white dark:bg-gray-600 shadow-sm text-primary transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg></button>
                        <button id="btn-list-view" class="p-1.5 rounded text-gray-500 hover:text-gray-900 dark:hover:text-white transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
                    </div>
                </div>
            </header>

            <div id="gallery-container" class="flex-1 overflow-y-auto p-4 md:p-6 bg-gray-50 dark:bg-gray-900 custom-scrollbar pb-24 md:pb-6">
                <div id="skeleton-loading" class="hidden grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
                <div id="gallery-content"></div>
            </div>

            <button id="mobile-upload-fab" class="md:hidden fixed bottom-6 right-6 w-14 h-14 bg-primary hover:bg-blue-600 text-white rounded-full shadow-2xl z-20 flex items-center justify-center transition-transform active:scale-90">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </main>
    </div>

    <div id="delete-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity p-4">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl max-w-sm w-full transform scale-95 transition-transform">
            <h3 class="text-lg font-bold mb-2 text-red-500">Konfirmasi Hapus</h3>
            <p class="text-gray-600 dark:text-gray-300 text-sm mb-6">Apakah Anda yakin ingin menghapus file ini? Tindakan ini tidak dapat dibatalkan.</p>
            <div class="flex justify-end gap-3">
                <button id="btn-cancel-delete" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors w-full sm:w-auto">Batal</button>
                <button id="btn-confirm-delete" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm font-medium transition-colors w-full sm:w-auto">Hapus File</button>
            </div>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/upload.js"></script>
    <script src="assets/js/gallery.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const btnOpen = document.getElementById('btn-open-sidebar');
            const btnClose = document.getElementById('btn-close-sidebar');
            const mobileFab = document.getElementById('mobile-upload-fab');
            const fileInput = document.getElementById('file-input');
          
            const toggleSidebar = () => {
                const isClosed = sidebar.classList.contains('-translate-x-full');
                if (isClosed) {
                 
                    overlay.classList.remove('hidden');
                    
                    setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                    sidebar.classList.remove('-translate-x-full');
                } else {
                    
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('opacity-0');
                    setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            };

            btnOpen.addEventListener('click', toggleSidebar);
            btnClose.addEventListener('click', toggleSidebar);
            overlay.addEventListener('click', toggleSidebar);

         
            mobileFab.addEventListener('click', () => {
                fileInput.click();
            });

            
            document.getElementById('btn-logout').addEventListener('click', () => {
                if(window.innerWidth < 768) toggleSidebar();
            });
        });
    </script>
</body>
</html>
